name: Uygulama Kurulum Dosyalarını Üret

# Sadece GitHub'a kod pushladığında çalışır
on: [push]

jobs:
  build:
    name: ${{ matrix.os }} üzerinde derleniyor
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Kodun çalışacağı 3 farklı işletim sistemi
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Kodları Bilgisayara İndir
        uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Kullandığın sürümü yaz

      - name: Gerekli Kütüphaneleri Yükle
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirements.txt

      - name: PyInstaller ile Klasör Olarak Derle
        run: pyinstaller --onedir --noconsole --name "SeninUygulaman" main.py

      # --- 1. WINDOWS SETUP (Inno Setup) ---
      - name: Windows Installer (.exe) Oluştur
        if: matrix.os == 'windows-latest'
        # GitHub'ın Windows makinelerinde Inno Setup yüklü gelir.
        # Önceden hazırladığın .iss dosyasını çalıştırarak setup'ı üretir.
        run: iscc windows_kurulum_ayarlari.iss

      # --- 2. MAC DMG SETUP ---
# --- 2. MAC DMG SETUP ---
      - name: macOS DMG Oluştur
        if: matrix.os == 'macos-latest'
        run: |
          npm install -g create-dmg
          # Uygulama adını kendi projene (ChiperNora) göre düzenlemeyi unutma!
          create-dmg --overwrite --skip-jenkins --identity "none" "dist/ChiperNora.dmg" "dist/ChiperNora.app/" || true

      # --- 3. LINUX DEB SETUP ---
      - name: Linux .deb Paketi Oluştur
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
          fpm -s dir -t deb -n "SeninUygulaman" -v 1.0.0 dist/SeninUygulaman=/opt/SeninUygulaman

      # --- SONUÇLARI KAYDET ---
      - name: Oluşan Setup Dosyalarını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Kurulum-Dosyalari-${{ matrix.os }}
          path: |
            *.exe
            *.dmg
            *.deb